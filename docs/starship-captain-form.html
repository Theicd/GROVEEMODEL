<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>מועמדות לקפטן — Starship Odyssey</title>
    <style>
      :root {
        --bg0: #050814;
        --bg1: #0a1024;
        --accent: #3dd6ff;
        --accent2: #9b5cff;
        --text: #e8f4ff;
        --muted: #8aa3c4;
        --ok: #4ade80;
        --err: #f87171;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(61, 214, 255, 0.12), transparent 55%),
          radial-gradient(ellipse 80% 50% at 100% 100%, rgba(155, 92, 255, 0.15), transparent 50%),
          linear-gradient(180deg, var(--bg0), var(--bg1) 40%, #02040a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }
      .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(1px 1px at 20% 30%, rgba(255, 255, 255, 0.35), transparent),
          radial-gradient(1px 1px at 70% 60%, rgba(255, 255, 255, 0.25), transparent),
          radial-gradient(1px 1px at 40% 80%, rgba(255, 255, 255, 0.2), transparent);
        opacity: 0.7;
      }
      .card {
        position: relative;
        width: min(440px, 100%);
        padding: 28px 26px 24px;
        border-radius: 20px;
        background: rgba(12, 18, 40, 0.72);
        border: 1px solid rgba(61, 214, 255, 0.28);
        box-shadow: 0 0 40px rgba(61, 214, 255, 0.08), 0 20px 50px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
      }
      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 21px;
        padding: 1px;
        background: linear-gradient(135deg, rgba(61, 214, 255, 0.5), transparent 40%, rgba(155, 92, 255, 0.4));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 1.35rem;
        letter-spacing: 0.02em;
        text-shadow: 0 0 24px rgba(61, 214, 255, 0.35);
      }
      .sub {
        margin: 0 0 22px;
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.45;
      }
      label {
        display: block;
        margin-bottom: 14px;
        font-size: 0.82rem;
        color: var(--muted);
      }
      label span.field {
        display: block;
        margin-bottom: 6px;
        color: var(--text);
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(138, 163, 196, 0.35);
        background: rgba(4, 8, 20, 0.65);
        color: var(--text);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(61, 214, 255, 0.2);
      }
      button[type="submit"] {
        width: 100%;
        margin-top: 8px;
        padding: 12px 16px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        color: #041018;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        box-shadow: 0 8px 28px rgba(61, 214, 255, 0.25);
      }
      button[type="submit"]:hover {
        filter: brightness(1.06);
      }
      .out {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 0.88rem;
        line-height: 1.5;
        display: none;
      }
      .out.ok {
        display: block;
        background: rgba(74, 222, 128, 0.12);
        border: 1px solid rgba(74, 222, 128, 0.35);
        color: #bbf7d0;
      }
      .out.err {
        display: block;
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.35);
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <div class="stars" aria-hidden="true"></div>
    <div class="card">
      <h1>מסע בין־כוכבים — מועמדות לקפטן</h1>
      <p class="sub">טופס רשמי להגשת מועמדות לתפקיד קפטן החללית <strong>Odyssey‑7</strong>. הנתונים נשארים בדפדפן שלך (דמו מקומי).</p>
      <form id="captain-form" novalidate>
        <label>
          <span class="field">שם מלא</span>
          <input name="fullName" type="text" autocomplete="name" required placeholder="לדוגמה: טל סטאר" />
        </label>
        <label>
          <span class="field">טלפון</span>
          <input name="phone" type="tel" autocomplete="tel" required placeholder="05x-xxxxxxx" />
        </label>
        <label>
          <span class="field">דוא״ל</span>
          <input name="email" type="email" autocomplete="email" required placeholder="you@shipfleet.space" />
        </label>
        <button type="submit">שליחת מועמדות</button>
      </form>
      <div id="msg" class="out" role="status"></div>
    </div>
    <script>
      (function () {
        var form = document.getElementById("captain-form");
        var msg = document.getElementById("msg");
        var phoneRe = /^[\d\s\-+()]{9,}$/;

        function show(text, ok) {
          msg.textContent = text;
          msg.className = "out " + (ok ? "ok" : "err");
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var data = new FormData(form);
          var name = (data.get("fullName") || "").toString().trim();
          var phone = (data.get("phone") || "").toString().trim();
          var email = (data.get("email") || "").toString().trim();

          if (name.length < 2) {
            show("נא להזין שם מלא תקין.", false);
            return;
          }
          if (!phoneRe.test(phone.replace(/\s/g, ""))) {
            show("נא להזין מספר טלפון תקין.", false);
            return;
          }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            show("נא להזין כתובת דוא״ל תקינה.", false);
            return;
          }

          show("המועמדות נקלטה בהצלחה, " + name + ". מערכת Odyssey תיצור קשר בקרוב.", true);
        });
      })();
    </script>
  </body>
</html>
